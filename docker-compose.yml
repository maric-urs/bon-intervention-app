# Production — même modèle que dsiweb :
# - pas de Traefik, pas de réseau NPM partagé
# - port exposé sur l'hôte → Nginx Proxy Manager fait le HTTPS
#
# Déploiement :
#   docker compose up -d --build
#
# HTTPS dans NPM (http://webapps:81) → Proxy Hosts → Add :
#   Domain Names     : bons.agglo.local   (ou votre domaine)
#   Scheme           : http
#   Forward Hostname : 172.17.0.1         (gateway Docker) ou IP du serveur
#   Forward Port     : 1899
#   SSL              : Let's Encrypt ou certificat interne + Force SSL

services:
  app:
    build: .
    container_name: bon-intervention-app
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-1899}:${PORT:-1899}"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
      DATABASE_URL: file:/data/prod.db
      PORT: "${PORT:-1899}"
    volumes:
      - bon_data:/data
    networks:
      - bon_net

volumes:
  bon_data:

# Sous-réseau dédié — 172.25.x Appwrite, 172.31.x DSI/docs, 172.40.x Orizon
networks:
  bon_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.42.0.0/16
