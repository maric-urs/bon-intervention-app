services:
  app:
    build: .
    container_name: bon-intervention-app
    ports:
      - "1899:1899"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/prod.db
      PORT: 1899
    volumes:
      - bon_data:/data
    networks:
      - frontend_net
    restart: unless-stopped

volumes:
  bon_data:

# Réutilise le réseau Orizon (évite le conflit de subnet 172.40.0.0/16).
# Vérifier le nom exact : docker network ls | grep frontend
networks:
  frontend_net:
    external: true
    name: ${FRONTEND_NETWORK:-frontend_frontend_net}
