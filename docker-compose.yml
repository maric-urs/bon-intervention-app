services:
  app:
    build: .
    container_name: bon-intervention-app
    ports:
      - "1899:1899"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/prod.db
      PORT: 1899
    volumes:
      - bon_data:/data
    networks:
      - bon_net
    restart: unless-stopped

volumes:
  bon_data:

# Sous-réseau dédié (libre sur le serveur) :
# utilisés ailleurs → 172.25.x (Appwrite), 172.31.x (DSI, docs…), 172.40.x (Orizon)
networks:
  bon_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.42.0.0/16
