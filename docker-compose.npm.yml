# Nginx Proxy Manager (stack revproxy sur Portainer)
#
# 1. Trouver le nom du réseau NPM :
#      docker inspect reverse-proxy --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{"\n"}}{{end}}'
#    Mettre le résultat dans .env → PROXY_NETWORK=...
#
# 2. Déploiement :
#      docker compose -f docker-compose.yml -f docker-compose.npm.yml up -d --build
#
# 3. NPM (http://webapps:81) → Proxy Hosts → Add :
#      Domain Names     : bons.votredomaine.fr
#      Forward Hostname : bon-intervention-app
#      Forward Port     : 1899
#      SSL              : Let's Encrypt + Force SSL

services:
  app:
    networks:
      - bon_net
      - npm_proxy

networks:
  npm_proxy:
    external: true
    name: ${PROXY_NETWORK}
